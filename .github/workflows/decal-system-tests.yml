name: DecalSystem Tests

on:
  pull_request:
    paths:
      - "Assets/Modules/DecalSystem/**"
      - "Tools/CI/**"
      - ".github/workflows/decal-system-tests.yml"
      - "Packages/**"
      - "ProjectSettings/**"
  workflow_dispatch:

jobs:
  editmode:
    name: EditMode
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run DecalSystem EditMode tests
        run: Tools/CI/run-decal-editmode-tests.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decal-editmode-results
          path: |
            Logs/TestResults/decal-editmode-results.xml
            Logs/TestResults/decal-editmode.log
          if-no-files-found: warn
